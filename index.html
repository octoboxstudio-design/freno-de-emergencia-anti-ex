       // --- SINTETIZADOR AMBIENTAL NATIVO ---
       class AmbientSynth {
           constructor() {
               this.ctx = null;
               this.mainGain = null;
               this.delayNode = null;
               this.feedbackGain = null;
               this.oscs = [];
               this.isPlaying = false;
               this.chimeTimer = null;
               this.padTimer = null;
               this.isMuted = false;
           }

           init() {
               if (this.ctx) return;
               try {
                   this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                   this.mainGain = this.ctx.createGain();
                   this.mainGain.gain.setValueAtTime(0, this.ctx.currentTime);
                   this.mainGain.connect(this.ctx.destination);

                   this.delayNode = this.ctx.createDelay();
                   this.delayNode.delayTime.setValueAtTime(0.8, this.ctx.currentTime);
                   this.feedbackGain = this.ctx.createGain();
                   this.feedbackGain.gain.setValueAtTime(0.35, this.ctx.currentTime);

                   this.delayNode.connect(this.feedbackGain);
                   this.feedbackGain.connect(this.delayNode);
                  
                   this.mainGain.connect(this.delayNode);
                   this.delayNode.connect(this.ctx.destination);
               } catch(e) {
                   console.warn("Audio no soportado o bloqueado", e);
               }
           }

           start() {
               this.init();
               if (!this.ctx) return;
               
               if (this.ctx.state === 'suspended') {
                   this.ctx.resume().catch(() => {});
               }
               this.isPlaying = true;
              
               try {
                   const targetVolume = this.isMuted ? 0 : 0.35;
                   this.mainGain.gain.cancelScheduledValues(this.ctx.currentTime);
                   this.mainGain.gain.setValueAtTime(this.mainGain.gain.value, this.ctx.currentTime);
                   this.mainGain.gain.linearRampToValueAtTime(targetVolume, this.ctx.currentTime + 3);
               } catch(e) {}

               this.startEvolvingPads();
               this.scheduleChimes();
           }

           startEvolvingPads() {
               const chords = [
                   [130.81, 164.81, 196.00, 246.94],
                   [174.61, 220.00, 261.63, 329.63],
                   [146.83, 174.61, 220.00, 293.66],
                   [196.00, 246.94, 293.66, 392.00] 
               ];

               let chordIndex = 0;
               const playNextChord = () => {
                   if (!this.isPlaying || !this.ctx) return;
                  
                   const oldOscs = [...this.oscs];
                   this.oscs = [];
                   const now = this.ctx.currentTime;
                   
                   oldOscs.forEach(o => {
                       try {
                           o.gain.gain.cancelScheduledValues(now);
                           o.gain.gain.setValueAtTime(o.gain.gain.value, now);
                           o.gain.gain.linearRampToValueAtTime(0, now + 4);
                       } catch(e) {}
                       
                       setTimeout(() => {
                           try { o.osc.stop(); } catch(e) {}
                       }, 5000);
                   });

                   try {
                       const notes = chords[chordIndex];
                       notes.forEach(freq => {
                           const osc = this.ctx.createOscillator();
                           const oscGain = this.ctx.createGain();
                          
                           osc.type = 'triangle';
                           osc.frequency.setValueAtTime(freq, now);
                           osc.detune.setValueAtTime(Math.random() * 8 - 4, now);

                           oscGain.gain.setValueAtTime(0, now);
                           oscGain.gain.linearRampToValueAtTime(0.04, now + 4.5);

                           const lowpass = this.ctx.createBiquadFilter();
                           lowpass.type = 'lowpass';
                           lowpass.frequency.setValueAtTime(320, now);

                           osc.connect(oscGain);
                           oscGain.connect(lowpass);
                           lowpass.connect(this.mainGain);
                          
                           osc.start(now);
                           this.oscs.push({ osc, gain: oscGain });
                       });
                   } catch(e) {}

                   chordIndex = (chordIndex + 1) % chords.length;
                   this.padTimer = setTimeout(playNextChord, 12000);
               };

               playNextChord();
           }

           scheduleChimes() {
               if (!this.isPlaying || !this.ctx) return;

               const scale = [523.25, 587.33, 659.25, 783.99, 880.00, 1046.50];
               const playChime = () => {
                   if (!this.isPlaying || !this.ctx) return;

                   try {
                       const freq = scale[Math.floor(Math.random() * scale.length)];
                       const now = this.ctx.currentTime;

                       const osc = this.ctx.createOscillator();
                       const gainNode = this.ctx.createGain();

                       osc.type = 'sine';
                       osc.frequency.setValueAtTime(freq, now);

                       gainNode.gain.setValueAtTime(0, now);
                       gainNode.gain.linearRampToValueAtTime(0.06, now + 0.1);
                       gainNode.gain.exponentialRampToValueAtTime(0.0001, now + 3.5);

                       osc.connect(gainNode);
                       gainNode.connect(this.mainGain);

                       osc.start(now);
                       osc.stop(now + 4);
                   } catch(e) {}

                   const nextTime = 3000 + Math.random() * 4000;
                   this.chimeTimer = setTimeout(playChime, nextTime);
               };

               this.chimeTimer = setTimeout(playChime, 2000);
           }

           stop() {
               this.isPlaying = false;
               clearTimeout(this.chimeTimer);
               clearTimeout(this.padTimer);
               
               if (this.mainGain && this.ctx) {
                   try {
                       this.mainGain.gain.cancelScheduledValues(this.ctx.currentTime);
                       this.mainGain.gain.setValueAtTime(this.mainGain.gain.value, this.ctx.currentTime);
                       this.mainGain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 1.5);
                   } catch(e) {}
               }
               
               setTimeout(() => {
                   this.oscs.forEach(o => {
                       try { o.osc.stop(); } catch(e) {}
                   });
                   this.oscs = [];
               }, 2000);
           }

           setMute(mute) {
               this.isMuted = mute;
               if (this.mainGain && this.ctx) {
                   try {
                       const targetVolume = mute ? 0 : 0.35;
                       this.mainGain.gain.cancelScheduledValues(this.ctx.currentTime);
                       this.mainGain.gain.setValueAtTime(this.mainGain.gain.value, this.ctx.currentTime);
                       this.mainGain.gain.linearRampToValueAtTime(targetVolume, this.ctx.currentTime + 0.8);
                   } catch(e) {}
               }
           }
       }

                                   type="email"
                                   placeholder="Ingresa tu mejor correo electrónico..."
                                   value={optInEmail}
                                   onChange={(e) => setOptInEmail(e.target.value)}
                                   className="w-full pl-10 pr-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 text-sm"
                                   required
                               />
                           </div>

                           <button
                               type="submit"
                               disabled={isSubmitting || !optInEmail.trim()}
                               className="w-full py-3.5 bg-emerald-600 hover:bg-emerald-500 text-white font-black rounded-xl text-xs uppercase tracking-wider shadow-md hover:scale-[1.01] active:scale-95 transition-all flex items-center justify-center gap-2 disabled:opacity-75"
                           >
                               {isSubmitting ? (
                                   <span className="flex items-center gap-2">
                                       <div className="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
                                       Guardando racha y enviando kit...
                                   </span>
                               ) : (
                                   <span className="flex items-center gap-2">
                                       <Download className="w-4 h-4" /> Enviar mi Kit de Rescate Gratis
                                   </span>
                               )}
                           </button>
                       </form>
                   </div>

                   <p className="text-[10px] text-center text-slate-400 leading-relaxed">
                       Cuidamos tu privacidad. Al unirte, recibirás el Kit interactivo de inmediato y consejos diarios sobre superación y dignidad de forma gratuita. Cancela tu suscripción con un solo clic cuando quieras.
                   </p>
               </div>
           );
       }

       function SuccessCTAView({ setView, registeredEmail }) {
           return (
               <div className="animate-fade-in flex flex-col items-center text-center space-y-6">
                   <div className="w-20 h-20 bg-emerald-100 rounded-full flex items-center justify-center shadow-inner">
                       <CheckCircle2 className="w-10 h-10 text-emerald-600" />
                   </div>
                  
                   <div className="space-y-1">
                       <h2 className="text-2xl font-black text-slate-900 leading-tight">¡Kit Enviado con Éxito!</h2>
                       <p className="text-slate-500 text-xs">Hemos enviado el enlace de descarga a <strong>{registeredEmail}</strong>.</p>
                       <p className="text-indigo-600 font-bold text-xs">Revisa tu bandeja de entrada en los próximos 2 minutos.</p>
                   </div>

                   <div className="bg-slate-900 text-left p-6 rounded-2xl shadow-lg w-full text-white relative overflow-hidden border border-slate-800">
                       <div className="absolute -right-6 -top-6 w-24 h-24 bg-indigo-500 opacity-20 rounded-full blur-2xl"></div>
                      
                       <span className="inline-block bg-indigo-600/30 text-indigo-400 border border-indigo-500/20 text-[10px] font-bold px-2 py-0.5 rounded-full uppercase tracking-wider mb-2">OPORTUNIDAD ÚNICA</span>
                       <p className="font-black text-lg mb-2 leading-tight">El kit te salvará hoy. Pero, ¿qué harás mañana?</p>
                       <p className="text-slate-300 text-xs mb-6 leading-relaxed">
                           Lograste no escribirle y bloquear el stalkeo temporal hoy, pero la esperanza de volver sigue sembrando dolor en silencio. Seguir esperando a quien ya eligió marcharse es una forma lenta de abandonarte a ti mismo.
                       </p>
                      
                       <div className="space-y-3 mb-6 border-t border-slate-800 pt-4">
                           <div className="flex items-start gap-2">
                               <CheckCircle2 className="w-4 h-4 text-emerald-400 shrink-0 mt-0.5" />
                               <span className="text-xs text-slate-200"><strong>Mata la Esperanza:</strong> Destruye la obsesión mental de raíz en 24 horas.</span>
                           </div>
                           <div className="flex items-start gap-2">
                               <CheckCircle2 className="w-4 h-4 text-emerald-400 shrink-0 mt-0.5" />
                               <span className="text-xs text-slate-200"><strong>Test de la Realidad Brutal:</strong> Desmantela las fantasías de reconciliación.</span>
                           </div>
                           <div className="flex items-start gap-2">
                               <CheckCircle2 className="w-4 h-4 text-emerald-400 shrink-0 mt-0.5" />
                               <span className="text-xs text-slate-200"><strong>Guiones Anti-Recaída Completos:</strong> Tu escudo definitivo de autorespeto.</span>
                           </div>
                       </div>

                       <a
                           href="https://metabolismo.joseguerrero.blog/home-page-page" target="_top"
                           className="block w-full py-4 bg-emerald-500 text-slate-900 font-black text-center rounded-xl shadow-lg hover:bg-emerald-400 hover:scale-[1.02] active:scale-95 transition-all duration-300 text-sm"
                       >
                           QUIERO ADQUIRIR EL PROGRAMA ($47)
                       </a>
                       <p className="text-center text-[10px] text-slate-400 mt-4">
                           Compra protegida. 30 días de garantía de satisfacción total.
                       </p>
                   </div>

                   <button onClick={() => setView('home')} className="text-xs font-medium text-slate-500 hover:text-slate-800 transition-colors pt-2">
                       Volver al panel inicial
                   </button>
               </div>
           );
       }

       // --- COMPONENTE PRINCIPAL (App) ---
       function App() {
           const [view, setView] = useState('home');
           const [messageDraft, setMessageDraft] = useState('');
           const [isTranslating, setIsTranslating] = useState(false);
           const [selectedTranslation, setSelectedTranslation] = useState('');
          
           const [timeLeft, setTimeLeft] = useState(300);
           const [quoteIndex, setQuoteIndex] = useState(0);
           const [isMuted, setIsMuted] = useState(false);
           const [showAbortConfirm, setShowAbortConfirm] = useState(false);
          
           const [optInEmail, setOptInEmail] = useState('');
           const [registeredEmail, setRegisteredEmail] = useState('');
           const [isSubmitting, setIsSubmitting] = useState(false);
           const [sourceCrisis, setSourceCrisis] = useState('');

           const [stats, setStats] = useState({ avoidedMessages: 0, avoidedStalks: 0 });

           useEffect(() => {
               try {
                   const savedStats = localStorage.getItem('mataEsperanza_stats');
                   if (savedStats) setStats(JSON.parse(savedStats)); 
               } catch (e) {}
           }, []);

           useEffect(() => {
               if (view === 'stalker_timer') {
                   ambientPlayer.setMute(isMuted);
                   ambientPlayer.start();
               } else {
                   ambientPlayer.stop();
               }
               return () => ambientPlayer.stop();
           }, [view]);

           useEffect(() => {
               ambientPlayer.setMute(isMuted);
           }, [isMuted]);

           const updateStats = (type) => {
               const newStats = { ...stats };
               if (type === 'message') newStats.avoidedMessages += 1;
               if (type === 'stalk') newStats.avoidedStalks += 1;
               setStats(newStats);
               try { localStorage.setItem('mataEsperanza_stats', JSON.stringify(newStats)); } catch (e) {}
           };

           useEffect(() => {
               if (view !== 'stalker_timer') return;
              
               if (timeLeft <= 0) {
                   handleTimerSuccess();
                   return;
               }

               const interval = setInterval(() => {
                   setTimeLeft((prev) => prev - 1);
               }, 1000);

               return () => clearInterval(interval);
           }, [view, timeLeft]);

           useEffect(() => {
               if (view !== 'stalker_timer') return;

               const quoteInterval = setInterval(() => {
                   setQuoteIndex((prev) => (prev + 1) % CONSCIOUS_STALKING_QUOTES.length);
               }, 8000);

               return () => clearInterval(quoteInterval);
           }, [view]);

           const formatTime = (seconds) => {
               const m = Math.floor(seconds / 60);
               const s = seconds % 60;
               return `${m}:${s.toString().padStart(2, '0')}`;
           };

           const handleGoToEmailGate = () => {
               updateStats('message');
               setSourceCrisis('message');
               setView('email_gate');
           };

           const startStalkerBrake = () => {
               setTimeLeft(300);
               setQuoteIndex(0);
               setShowAbortConfirm(false);
               setView('stalker_timer');
           };

           const handleTimerSuccess = () => {
               updateStats('stalk');
               setSourceCrisis('stalk');
               setView('email_gate');
           };

           const triggerAbortConfirmation = () => { setShowAbortConfirm(true); };
           const confirmAbort = () => { setShowAbortConfirm(false); setView('home'); };
           const cancelAbort = () => { setShowAbortConfirm(false); };

           // --- AQUÍ ESTÁ LA FUNCIÓN QUE FALTABA (EL MOTOR DEL SIMULADOR) ---
           const handleAnalyzeMessage = (e) => {
               e.preventDefault();
               if (!messageDraft.trim()) return;
               setIsTranslating(true);

               const randomIndex = Math.floor(Math.random() * BRUTAL_TRANSLATIONS.length);
               setSelectedTranslation(BRUTAL_TRANSLATIONS[randomIndex]);

               setTimeout(() => {
                   setIsTranslating(false);
                   setView('interceptor_result');
               }, 1500);
           };

           // Conexión nativa con GHL (Promesas seguras)
           const handleOptIn = (e) => {
               e.preventDefault();
               if (!optInEmail.trim()) return;
               setIsSubmitting(true);

               const webhookUrl = "https://services.leadconnectorhq.com/hooks/8fyHQ2c4yy3GFQStNOHK/webhook-trigger/bH8iaSwQfQRC45EcG4aA";

               fetch(webhookUrl, {
                   method: 'POST',
                   headers: { 'Content-Type': 'application/json' },
                   body: JSON.stringify({ 
                       email: optInEmail, 
                       source: "Freno de Emergencia Anti-Ex" 
                   })
               })
               .then(response => {
                   if (response.ok) {
                       console.log("Lead sincronizado exitosamente con GHL.");
                   } else {
                       console.warn("Fallo reportado por GHL, avanzando de todos modos.");
                   }
                   setRegisteredEmail(optInEmail);
                   setOptInEmail('');
                   setMessageDraft('');
                   setView('success_cta');
               })
               .catch(err => {
                   console.error("Error de red:", err);
                   setRegisteredEmail(optInEmail);
                   setView('success_cta');
               })
               .finally(() => {
                   setIsSubmitting(false);
               });
           };

           return (
               <div className="max-w-md mx-auto bg-white rounded-2xl shadow-xl border border-slate-100 overflow-hidden min-h-[500px] flex flex-col">
                   <div className="bg-slate-900 px-6 py-4 flex items-center justify-between">
                       <div className="flex items-center gap-2">
                           <ShieldAlert className="w-5 h-5 text-emerald-400" />
                           <span className="font-bold text-white tracking-wide text-xs">PANEL DE EMERGENCIA</span>
                       </div>
                   </div>
                  
                   <div className="p-6 flex-1 flex flex-col justify-between">
                       <div>
                           {view === 'home' && (
                               <HomeView setView={setView} startStalkerBrake={startStalkerBrake} stats={stats} />
                           )}
                          
                           {view === 'interceptor_input' && (
                               <InterceptorInputView
                                   setView={setView}
                                   messageDraft={messageDraft}
                                   setMessageDraft={setMessageDraft}
                                   handleAnalyzeMessage={handleAnalyzeMessage}
                                   isTranslating={isTranslating}
                               />
                           )}
                          
                           {view === 'interceptor_result' && (
                               <InterceptorResultView
                                   setView={setView}
                                   messageDraft={messageDraft}
                                   selectedTranslation={selectedTranslation}
                                   handleGoToEmailGate={handleGoToEmailGate}
                               />
                           )}
                          
                           {view === 'stalker_timer' && (
                               <StalkerTimerView
                                   timeLeft={timeLeft}
                                   quoteIndex={quoteIndex}
                                   showAbortConfirm={showAbortConfirm}
                                   confirmAbort={confirmAbort}
                                   cancelAbort={cancelAbort}
                                   triggerAbortConfirmation={triggerAbortConfirmation}
                                   formatTime={formatTime}
                                   isMuted={isMuted}
                                   setIsMuted={setIsMuted}
                               />
                           )}

                           {view === 'email_gate' && (
                               <EmailGateView
                                   setView={setView}
                                   handleOptIn={handleOptIn}
                                   optInEmail={optInEmail}
                                   setOptInEmail={setOptInEmail}
                                   isSubmitting={isSubmitting}
                                   sourceCrisis={sourceCrisis}
                               />
                           )}
                          
                           {view === 'success_cta' && (
                               <SuccessCTAView setView={setView} registeredEmail={registeredEmail} />
                           )}
                       </div>
                   </div>
               </div>
           );
       }

       const root = createRoot(document.getElementById('root'));
       root.render(<App />);
   </script>
</body>
</html>
