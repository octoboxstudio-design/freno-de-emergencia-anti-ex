       // --- SINTETIZADOR AMBIENTAL NATIVO (WEB AUDIO API ENGINE) ---
       class AmbientSynth {
           constructor() {
               this.ctx = null;
               this.mainGain = null;
               this.delayNode = null;
               this.feedbackGain = null;
               this.oscs = [];
               this.isPlaying = false;
               this.chimeTimer = null;
               this.padTimer = null;
               this.isMuted = false;
           }

           init() {
               if (this.ctx) return;
               this.ctx = new (window.AudioContext || window.webkitAudioContext)();
              
               this.mainGain = this.ctx.createGain();
               this.mainGain.gain.setValueAtTime(0, this.ctx.currentTime);
               this.mainGain.connect(this.ctx.destination);

               this.delayNode = this.ctx.createDelay();
               this.delayNode.delayTime.setValueAtTime(0.8, this.ctx.currentTime);
               this.feedbackGain = this.ctx.createGain();
               this.feedbackGain.gain.setValueAtTime(0.35, this.ctx.currentTime);

               this.delayNode.connect(this.feedbackGain);
               this.feedbackGain.connect(this.delayNode);
              
               this.mainGain.connect(this.delayNode);
               this.delayNode.connect(this.ctx.destination);
           }

           start() {
               this.init();
               if (this.ctx.state === 'suspended') {
                   this.ctx.resume();
               }
               this.isPlaying = true;
              
               const targetVolume = this.isMuted ? 0 : 0.35;
               this.mainGain.gain.linearRampToValueAtTime(targetVolume, this.ctx.currentTime + 3);

               this.startEvolvingPads();
               this.scheduleChimes();
           }

           startEvolvingPads() {
               const chords = [
                   [130.81, 164.81, 196.00, 246.94], // Cmaj7
                   [174.61, 220.00, 261.63, 329.63], // Fmaj7
                   [146.83, 174.61, 220.00, 293.66], // Dm7
                   [196.00, 246.94, 293.66, 392.00]  // G7sus4
               ];

               let chordIndex = 0;
               const playNextChord = () => {
                   if (!this.isPlaying) return;
                  
                   const oldOscs = [...this.oscs];
                   this.oscs = [];
                   const now = this.ctx.currentTime;
                   oldOscs.forEach(o => {
                       o.gain.gain.linearRampToValueAtTime(0, now + 4);
                       setTimeout(() => {
                           try { o.osc.stop(); } catch(e) {}
                       }, 5000);
                   });

                   const notes = chords[chordIndex];
                   notes.forEach(freq => {
                       const osc = this.ctx.createOscillator();
                       const oscGain = this.ctx.createGain();
                      
                       osc.type = 'triangle';
                       osc.frequency.setValueAtTime(freq, now);
                       osc.detune.setValueAtTime(Math.random() * 8 - 4, now);

                       oscGain.gain.setValueAtTime(0, now);
                       oscGain.gain.linearRampToValueAtTime(0.04, now + 4.5);

                       const lowpass = this.ctx.createBiquadFilter();
                       lowpass.type = 'lowpass';
                       lowpass.frequency.setValueAtTime(320, now);

                       osc.connect(oscGain);
                       oscGain.connect(lowpass);
                       lowpass.connect(this.mainGain);
                      
                       osc.start(now);
                       this.oscs.push({ osc, gain: oscGain });
                   });

                   chordIndex = (chordIndex + 1) % chords.length;
                   this.padTimer = setTimeout(playNextChord, 12000);
               };

               playNextChord();
           }

           scheduleChimes() {
               if (!this.isPlaying) return;

               const scale = [523.25, 587.33, 659.25, 783.99, 880.00, 1046.50];
               const playChime = () => {
                   if (!this.isPlaying) return;

                   const freq = scale[Math.floor(Math.random() * scale.length)];
                   const now = this.ctx.currentTime;

                   const osc = this.ctx.createOscillator();
                   const gainNode = this.ctx.createGain();

                   osc.type = 'sine';
                   osc.frequency.setValueAtTime(freq, now);

                   gainNode.gain.setValueAtTime(0, now);
                   gainNode.gain.linearRampToValueAtTime(0.06, now + 0.1);
                   gainNode.gain.exponentialRampToValueAtTime(0.0001, now + 3.5);

                   osc.connect(gainNode);
                   gainNode.connect(this.mainGain);

                   osc.start(now);
                   osc.stop(now + 4);

                   const nextTime = 3000 + Math.random() * 4000;
                   this.chimeTimer = setTimeout(playChime, nextTime);
               };

               this.chimeTimer = setTimeout(playChime, 2000);
           }

           stop() {
               this.isPlaying = false;
               clearTimeout(this.chimeTimer);
               clearTimeout(this.padTimer);
               if (this.mainGain) {
                   this.mainGain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 1.5);
               }
               setTimeout(() => {
                   this.oscs.forEach(o => {
                       try { o.osc.stop(); } catch(e) {}
                   });
                   this.oscs = [];
               }, 2000);
           }

           setMute(mute) {
               this.isMuted = mute;
               if (this.mainGain && this.ctx) {
                   const targetVolume = mute ? 0 : 0.35;
                   this.mainGain.gain.linearRampToValueAtTime(targetVolume, this.ctx.currentTime + 0.8);
               }
           }
       }
